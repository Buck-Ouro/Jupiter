name: Test

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Strata script
      env:
        GOOGLEAPI: ${{ secrets.GOOGLEAPI }}
        SHEET_ID: ${{ secrets.SHEET_ID }}
        PROXY2_HTTP: ${{ secrets.PROXY2_HTTP }}
        Y_WALLET_ADD: ${{ secrets.Y_WALLET_ADD }}
      run: python strata.py
